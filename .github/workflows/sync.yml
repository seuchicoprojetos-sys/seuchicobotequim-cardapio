name: Sync to Seuchico
on:
  push:
    branches:
      - master

jobs:
  git-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror
        run: |
          # URL atualizada com o perfil correto: seuchicoprojetos-sys
          git remote add mirror https://${{ secrets.SYNC_TOKEN }}@github.com/seuchicoprojetos-sys/seuchicobotequim-cardapio.git
          
          # Força a sincronização da branch master
          git push --force --prune mirror refs/remotes/origin/master:refs/heads/master