name: Sync to Seuchico
on:
  push:
    branches:
      - master

jobs:
  git-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror
        run: |
          # Remove o remote antigo para evitar conflito
          git remote remove mirror || true
          
          # Adiciona o remote usando o token de forma explícita
          git remote add mirror https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/seuchicoprojetos-sys/seuchicobotequim-cardapio.git
          
          # Faz o push ignorando verificações de e-mail do servidor
          git push --force mirror master